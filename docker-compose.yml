services:
  # 1. Login & Authentication (Spring Boot + Kotlin)
  auth-api:
    build: ./services/auth-api
    container_name: auth-service
    environment:
      - DB_URL=jdbc:mariadb://db-main:3306/${DB_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db-main
    networks:
      - backend-net

  # 2. Data Analysis (Python / FastAPI)
  analysis-api:
    build: ./services/analysis-api
    container_name: analysis-service
    environment:
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - backend-net

  # 3. Windows App Support API (.NET)
  win-app-api:
    build: ./services/win-app-api
    container_name: win-app-service
    environment:
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - backend-net

  # 4. Web Frontend (Node.js)
  web-frontend:
    build: ./services/web-frontend
    container_name: web-frontend
    environment:
      - API_URL=http://${API_DOMAIN}
    networks:
      - backend-net

  # 5. Infrastructure - Database (MariaDB)
  db-main:
    image: mariadb:latest
    container_name: mariadb
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./infra/mariadb/data:/var/lib/mysql
    networks:
      - backend-net

  # 6. Gateway / Reverse Proxy (Nginx)
  gateway:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    environment:
      - DOMAIN=${DOMAIN}
      - API_DOMAIN=${API_DOMAIN}
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-frontend
      - auth-api
      - analysis-api
      - win-app-api
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge
