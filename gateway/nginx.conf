worker_processes auto;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- Main Web Domain (semicapstone.com) ---
    server {
        listen 80;
        server_name localhost; # Replace with ${DOMAIN} if using envsubst

        location / {
            proxy_pass http://web-frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # --- API Subdomain (api.semicapstone.com) ---
    server {
        listen 80;
        server_name api.localhost; # Replace with ${API_DOMAIN} if using envsubst

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Auth Service
        location /auth/ {
            proxy_pass http://auth-api:8080/;
        }

        # Analysis Service
        location /analysis/ {
            proxy_pass http://analysis-api:8000/;
        }

        # WinApp Support Service
        location /winapp/ {
            proxy_pass http://win-app-api:5000/;
        }
    }
}
